<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — STAMM</title>
<link rel="icon" type="image/svg+xml" href="assets/logos/logo-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a2e1a;
    --moss: #4a6741;
    --snow: #f5f3f0;
    --cream: #faf9f7;
    --gold: #b8954f;
    --text: #1a1a18;
    --text-muted: #6b6860;
    --rule: #d4d0ca;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text); background: var(--cream);
    line-height: 1.7; -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  [data-lang="en"] { display: none; }
  body.en [data-lang="en"] { display: initial; }
  body.en [data-lang="de"] { display: none; }

  body::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 100% 50% at 50% 85%, rgba(74,103,65,.08), transparent 70%),
      radial-gradient(ellipse 60% 40% at 30% 70%, rgba(26,46,26,.04), transparent);
    pointer-events: none;
  }

  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center;
    margin-top: -6vh;
  }

  .tree-icon {
    margin-bottom: 2rem;
    opacity: .12;
  }

  .error-code {
    font-family: 'Playfair Display', serif;
    font-size: clamp(5rem, 15vw, 10rem);
    font-weight: 700;
    color: var(--forest);
    line-height: 1;
    opacity: .08;
    margin-bottom: -1.5rem;
    position: relative;
    z-index: 0;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 600; color: var(--forest);
    margin-bottom: .75rem;
    position: relative; z-index: 1;
  }

  p {
    font-size: 1rem; color: var(--text-muted);
    max-width: 400px; margin-bottom: 2.5rem;
  }

  .home-link {
    display: inline-flex; align-items: center; gap: .5rem;
    font-size: .85rem; font-weight: 500; letter-spacing: .06em;
    text-transform: uppercase; text-decoration: none;
    color: var(--forest); border: 1px solid var(--forest);
    padding: .85rem 2rem; border-radius: 2px;
    transition: all .25s;
  }
  .home-link:hover { background: var(--forest); color: var(--cream); }

  .lang-toggle {
    position: fixed; top: 1.5rem; right: 1.5rem; z-index: 10;
    background: none; border: 1px solid var(--rule); border-radius: 100px;
    padding: .3rem .75rem; font-size: .7rem; letter-spacing: .1em;
    font-weight: 500; cursor: pointer; color: var(--text-muted);
    transition: all .25s; font-family: inherit;
  }
  .lang-toggle:hover { border-color: var(--forest); color: var(--forest); }

  .forest-bg {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 1;
    pointer-events: none;
  }

  .forest-layer {
    position: absolute; bottom: 0; left: 0;
    width: 100%;
  }
</style>
</head>
<body>

<button class="lang-toggle" onclick="document.body.classList.toggle('en'); this.textContent = document.body.classList.contains('en') ? 'DE' : 'EN';">EN</button>

<div class="content">
  <svg class="tree-icon" width="80" height="80" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="48" stroke="#1a2e1a" stroke-width="2.5"/>
    <ellipse cx="60" cy="60" rx="32" ry="34" stroke="#1a2e1a" stroke-width="2"/>
    <ellipse cx="61" cy="59" rx="17" ry="19" stroke="#1a2e1a" stroke-width="1.5"/>
    <circle cx="61" cy="59" r="3.5" fill="#b8954f"/>
  </svg>

  <div class="error-code">404</div>

  <h1>
    <span data-lang="de">Hier wächst nichts.</span>
    <span data-lang="en">Nothing grows here.</span>
  </h1>

  <p>
    <span data-lang="de">Diese Seite existiert nicht — aber unser Wald schon.</span>
    <span data-lang="en">This page doesn't exist — but our forest does.</span>
  </p>

  <a href="index.html" class="home-link">
    <span data-lang="de">Zurück zum Wald</span>
    <span data-lang="en">Back to the Forest</span>
  </a>
</div>

</div>

<script>
  if (!navigator.language.startsWith('de')) {
    document.body.classList.add('en');
    document.querySelector('.lang-toggle').textContent = 'DE';
  }
</script>

</body>
</html>
